[profile.default]
src = "src"
out = "out"
solc_version = "0.8.28"
libs = ["lib"]


remappings = [
    "openzeppelin-contracts/=lib/openzeppelin-contracts/",
    "@openzeppelin/=lib/openzeppelin-contracts/"
]


optimizer = true
optimizer_runs = 1000


evm_version = "cancun"


[rpc_endpoints]
amoy = "${AMOY_RPC_URL}"


[etherscan]
amoy = { key = "${POLYGONSCAN_API_KEY}", url = "https://api-amoy.polygonscan.com/api" }



[invariant]
runs = 256
depth = 15